name: Build EletroNIC APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Instalar Cordova e Dependências
        run: |
          npm install -g cordova
          npm install

      - name: Configurar Plataforma Android e Compilar
        run: |
          cordova platform add android || true
          cordova build android --debug

      - name: Upload APK Temporário (Teste)
        uses: actions/upload-artifact@v4
        with:
          name: EletroNIC-Build-Ref-${{ github.run_number }}
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk[cite: 1]
          retention-days: 3 # Deleta do Actions após 3 dias para proteger os 500 MB do repositório privado[cite: 1]
